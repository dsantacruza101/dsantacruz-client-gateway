
# Server configuration
# server_name will be auto-generated for each instance
listen: "0.0.0.0:4222"
port: 4222
http_port: 8222

# Clustering configuration
cluster {
    name: "nats_cluster"
    listen: "0.0.0.0:6222"
    port: 6222
    no_advertise: false
}

# Limits
max_payload: 10485760          # 10MB - matches your .env NATS_MAX_PAYLOAD
max_connections: 10000         # High concurrency support
max_subscriptions: 0           # Unlimited subscriptions
max_control_line: 4096         # Control line size

# Connection timeouts and health checks
ping_interval: "2m"            # 120 seconds - matches your .env PING_INTERVAL
ping_max: 2                    # Max failed pings before disconnect
write_deadline: "10s"          # Write timeout

# Logging (enable for debugging if needed)
debug: false
trace: false
logtime: true


